<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>재미있는 숫자 놀이</title>
    <!-- Tailwind CSS (스타일) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & 라이브러리 로드 (ESM 방식) -->
    <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom": "https://esm.sh/react-dom@18.2.0/client",
        "framer-motion": "https://esm.sh/framer-motion@10.16.4",
        "lucide-react": "https://esm.sh/lucide-react@0.344.0",
        "canvas-confetti": "https://esm.sh/canvas-confetti@1.9.2"
      }
    }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #fdfaf4; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import React, { useState, useEffect, useCallback, useRef } from 'react';
        import ReactDOM from 'react-dom';
        import { motion, AnimatePresence } from 'framer-motion';
        import * as Lucide from 'lucide-react';
        import confetti from 'canvas-confetti';

        // --- Constants ---
        const COLOR_HEX = ["#f87171","#fb923c","#facc15","#a3e635","#4ade80","#2dd4bf","#60a5fa","#818cf8","#c084fc","#f472b6"];
        const PAD_HEX   = ["#ef4444","#a855f7","#3b82f6","#1e3a8a","#14b8a6","#16a34a","#65a30d","#ca8a04","#f97316","#ec4899"];

        // --- Helper Components ---
        const Icon = ({ name, ...props }) => {
            const LucideIcon = Lucide[name];
            return LucideIcon ? React.createElement(LucideIcon, props) : null;
        };

        const ConfettiEffect = () => {
            useEffect(() => {
                const duration = 3 * 1000;
                const animationEnd = Date.now() + duration;
                const interval = setInterval(() => {
                    const timeLeft = animationEnd - Date.now();
                    if (timeLeft <= 0) return clearInterval(interval);
                    confetti({ particleCount: 50 * (timeLeft / duration), origin: { x: Math.random(), y: Math.random() - 0.2 } });
                }, 250);
                return () => clearInterval(interval);
            }, []);
            return null;
        };

        const SuccessModal = ({ onRestart, onHome, title = "완성!", subtitle = "참 잘했어요!", winner = null }) => (
            <motion.div initial={{ opacity: 0, scale: 0.8 }} animate={{ opacity: 1, scale: 1 }} className="fixed inset-0 z-50 flex items-center justify-center bg-black/20 backdrop-blur-sm">
                <ConfettiEffect />
                <div className="bg-white rounded-3xl p-8 shadow-2xl text-center max-w-sm w-full mx-4 border-4 border-amber-100">
                    <div className="text-6xl mb-4">{winner ? '🏆' : '🎉'}</div>
                    <h2 className="text-3xl font-bold text-gray-800 mb-2">{winner ? `${winner} 승리!` : title}</h2>
                    <p className="text-gray-600 mb-8">{subtitle}</p>
                    <div className="flex gap-4 justify-center">
                        <button onClick={onRestart} className="flex items-center gap-2 px-6 py-3 bg-indigo-500 text-white rounded-xl font-bold hover:bg-indigo-600 transition-colors shadow-lg">다시하기</button>
                        <button onClick={onHome} className="flex items-center gap-2 px-6 py-3 bg-amber-500 text-white rounded-xl font-bold hover:bg-amber-600 transition-colors shadow-lg">처음으로</button>
                    </div>
                </div>
            </motion.div>
        );

        // --- Games ---
        const Game1 = ({ onHome }) => {
            const [placed, setPlaced] = useState([]);
            const [available, setAvailable] = useState([]);
            const [isFinished, setIsFinished] = useState(false);

            const initGame = useCallback(() => {
                const items = Array.from({ length: 10 }, (_, i) => ({ id: i + 1, value: i + 1, color: COLOR_HEX[i] }));
                setAvailable(items.sort(() => Math.random() - 0.5));
                setPlaced([]);
                setIsFinished(false);
            }, []);

            useEffect(() => initGame(), [initGame]);

            const handlePlace = (item) => {
                if (item.value === placed.length + 1) {
                    setPlaced([...placed, item.value]);
                    setAvailable(available.filter(a => a.id !== item.id));
                    if (placed.length + 1 === 10) setIsFinished(true);
                }
            };

            const NumberBar = ({ value, color, isGhost = false }) => (
                <div className="flex flex-col items-center gap-1">
                    <div className={`w-12 rounded-t-lg flex flex-col-reverse overflow-hidden transition-all duration-300 ${isGhost ? 'border-2 border-dashed border-gray-200 bg-transparent' : 'shadow-md border-b-4 border-black/10'}`} style={{ height: `${value * 22 + 12}px`, backgroundColor: isGhost ? 'transparent' : color }}>
                        {Array.from({ length: value }).map((_, i) => (
                            <div key={i} className={`w-full h-5 border-t border-white/30 first:border-t-0 flex items-center justify-center ${isGhost ? 'border-gray-100' : ''}`}>
                                {!isGhost && i === value - 1 && <span className="text-white font-black text-sm drop-shadow-sm">{value}</span>}
                            </div>
                        ))}
                    </div>
                    <span className={`text-sm font-black ${isGhost ? 'text-gray-300' : 'text-gray-600'}`}>{value}</span>
                </div>
            );

            return (
                <div className="min-h-screen p-6 flex flex-col items-center">
                    <div className="w-full max-w-4xl flex justify-between items-center mb-8">
                        <button onClick={onHome} className="px-4 py-2 bg-rose-100 text-rose-700 rounded-full font-bold">처음으로</button>
                        <button onClick={initGame} className="px-4 py-2 bg-indigo-100 text-indigo-700 rounded-full font-bold">다시하기</button>
                    </div>
                    <h1 className="text-3xl font-black text-gray-800 mb-12 text-center">1부터 10까지 순서대로 옮겨요!</h1>
                    <div className="flex items-end gap-3 h-72 mb-16 w-full max-w-3xl justify-center bg-white/50 rounded-[3rem] p-8 border-4 border-white shadow-xl relative">
                        {Array.from({ length: 10 }, (_, i) => (
                            <div key={i}>{placed.length > i ? <NumberBar value={i + 1} color={COLOR_HEX[i]} /> : <NumberBar value={i + 1} isGhost />}</div>
                        ))}
                    </div>
                    <div className="flex flex-wrap justify-center items-end gap-5 min-h-[240px] bg-white/40 p-8 rounded-[3rem] w-full max-w-3xl">
                        {available.map(item => (
                            <motion.button key={item.id} onClick={() => handlePlace(item)} whileHover={{ scale: 1.1, y: -10 }} whileTap={{ scale: 0.9 }}>
                                <NumberBar value={item.value} color={item.color} />
                            </motion.button>
                        ))}
                    </div>
                    {isFinished && <SuccessModal onRestart={initGame} onHome={onHome} />}
                </div>
            );
        };

        const Game2 = ({ onHome }) => {
            const [target, setTarget] = useState(0);
            const [draggedCount, setDraggedCount] = useState(0);
            const [isFinished, setIsFinished] = useState(false);
            const [usedSourceCircles, setUsedSourceCircles] = useState([]);
            const dropZoneRef = useRef(null);

            const initGame = useCallback(() => {
                setTarget(Math.floor(Math.random() * 9) + 1);
                setDraggedCount(0);
                setIsFinished(false);
                setUsedSourceCircles([]);
            }, []);

            useEffect(() => initGame(), [initGame]);

            const handleDragEnd = (event, info, circleIndex) => {
                if (!dropZoneRef.current) return;
                const dropZone = dropZoneRef.current.getBoundingClientRect();
                const x = event.clientX || (event.touches && event.touches[0].clientX);
                const y = event.clientY || (event.touches && event.touches[0].clientY);

                if (x >= dropZone.left && x <= dropZone.right && y >= dropZone.top && y <= dropZone.bottom) {
                    if (draggedCount + target < 10 && !usedSourceCircles.includes(circleIndex)) {
                        setDraggedCount(prev => prev + 1);
                        setUsedSourceCircles(prev => [...prev, circleIndex]);
                    }
                }
            };

            const handleNumberClick = (num) => {
                if (target + num === 10 && draggedCount === num) setIsFinished(true);
            };

            return (
                <div className="min-h-screen p-6 flex flex-col items-center">
                    <div className="w-full max-w-5xl flex justify-between items-center mb-8">
                        <button onClick={onHome} className="px-4 py-2 bg-rose-100 text-rose-700 rounded-full font-bold">처음으로</button>
                        <button onClick={initGame} className="px-4 py-2 bg-indigo-100 text-indigo-700 rounded-full font-bold">다시하기</button>
                    </div>
                    <h1 className="text-4xl font-black text-gray-800 mb-12 text-center">10이 되는 짝꿍 수를 찾아라!</h1>
                    <div className="flex flex-col md:flex-row gap-8 items-center mb-12">
                        <div className="bg-white p-8 rounded-[3rem] shadow-xl border-8 border-orange-200 w-[350px] h-[250px] grid grid-cols-5 gap-3 relative pt-12">
                            <div className="absolute -top-4 left-6 bg-red-500 text-white px-4 py-1 rounded-full font-black">제시된 수: {target}</div>
                            {Array.from({ length: 10 }).map((_, i) => (
                                <div key={i} className={`w-12 h-12 rounded-full border-2 ${i < target ? 'bg-red-400 border-red-500' : 'border-dashed border-gray-100'}`} />
                            ))}
                        </div>
                        <div className="text-4xl font-black text-orange-400">+</div>
                        <div ref={dropZoneRef} className="bg-white p-8 rounded-[3rem] shadow-xl border-8 border-orange-200 w-[350px] h-[250px] grid grid-cols-5 gap-3 relative pt-12">
                            <div className="absolute -top-4 left-6 bg-blue-500 text-white px-4 py-1 rounded-full font-black">짝꿍 수: {draggedCount}</div>
                            {Array.from({ length: 10 }).map((_, i) => (
                                <div key={i} className={`w-12 h-12 rounded-full border-2 ${i < draggedCount ? 'bg-blue-400 border-blue-500' : 'border-dashed border-gray-100'}`} />
                            ))}
                        </div>
                    </div>
                    <div className="flex flex-wrap justify-center gap-3 p-6 bg-white/40 rounded-[2rem] mb-12">
                        {Array.from({ length: 10 }).map((_, i) => (
                            <div key={i} className="w-14 h-14 relative">
                                {!usedSourceCircles.includes(i) && (
                                    <motion.div drag dragSnapToOrigin onDragEnd={(e, info) => handleDragEnd(e, info, i)} className="w-14 h-14 bg-blue-500 rounded-full border-4 border-blue-600 shadow-lg cursor-pointer z-10 relative" />
                                )}
                                <div className="absolute inset-0 w-14 h-14 bg-gray-100 rounded-full border-2 border-dashed border-gray-200" />
                            </div>
                        ))}
                    </div>
                    <div className="flex gap-2 w-full max-w-4xl">
                        {Array.from({ length: 10 }, (_, i) => i + 1).map((num, idx) => (
                            <button key={num} onClick={() => handleNumberClick(num)} className="flex-1 h-16 rounded-xl font-black text-2xl text-white shadow-lg border-b-4 border-black/20" style={{ backgroundColor: PAD_HEX[idx] }}>{num}</button>
                        ))}
                    </div>
                    {isFinished && <SuccessModal onRestart={initGame} onHome={onHome} subtitle={`${target}의 짝꿍은 ${10 - target}이에요!`} />}
                </div>
            );
        };

        const Battle = ({ maxNum, onHome }) => {
            const [p1Next, setP1Next] = useState(1);
            const [p2Next, setP2Next] = useState(1);
            const [p1Nums, setP1Nums] = useState([]);
            const [p2Nums, setP2Nums] = useState([]);
            const [timeLeft, setTimeLeft] = useState(30);
            const [isStarted, setIsStarted] = useState(false);
            const [isFinished, setIsFinished] = useState(false);
            const [winner, setWinner] = useState(null);

            const initGame = useCallback(() => {
                const items = Array.from({ length: maxNum }, (_, i) => i + 1).sort(() => Math.random() - 0.5);
                setP1Nums(items); setP2Nums([...items].sort(() => Math.random() - 0.5));
                setP1Next(1); setP2Next(1); setTimeLeft(30); setIsStarted(false); setIsFinished(false); setWinner(null);
            }, [maxNum]);

            useEffect(() => initGame(), [initGame]);

            useEffect(() => {
                if (isStarted && timeLeft > 0 && !isFinished) {
                    const timer = setInterval(() => setTimeLeft(t => Math.max(0, t - 0.1)), 100);
                    return () => clearInterval(timer);
                } else if (timeLeft === 0) {
                    setIsFinished(true); setWinner(p1Next > p2Next ? '플레이어 1' : '플레이어 2');
                }
            }, [isStarted, timeLeft, isFinished]);

            const handleClick = (p, v) => {
                if (p === 1 && v === p1Next) {
                    setP1Next(v + 1); setP1Nums(p1Nums.filter(n => n !== v));
                    if (v === maxNum) { setWinner('플레이어 1'); setIsFinished(true); }
                } else if (p === 2 && v === p2Next) {
                    setP2Next(v + 1); setP2Nums(p2Nums.filter(n => n !== v));
                    if (v === maxNum) { setWinner('플레이어 2'); setIsFinished(true); }
                }
            };

            if (!isStarted && !isFinished) return (
                <div className="min-h-screen flex flex-col items-center justify-center">
                    <h1 className="text-4xl font-black mb-12">1:1 대결! 준비됐나요?</h1>
                    <button onClick={() => setIsStarted(true)} className="px-12 py-6 bg-indigo-500 text-white rounded-3xl font-black text-2xl shadow-xl">대결 시작!</button>
                </div>
            );

            return (
                <div className="min-h-screen flex flex-col">
                    <div className="p-4 flex justify-between items-center bg-white border-b shadow-sm">
                        <button onClick={onHome} className="px-4 py-2 bg-rose-100 text-rose-700 rounded-full font-bold">처음으로</button>
                        <div className="text-3xl font-black text-rose-500">{timeLeft.toFixed(1)}s</div>
                        <button onClick={initGame} className="px-4 py-2 bg-indigo-100 text-indigo-700 rounded-full font-bold">다시하기</button>
                    </div>
                    <div className="flex flex-1">
                        <div className="flex-1 p-6 border-r flex flex-col items-center">
                            <div className="mb-4 text-xl font-bold text-blue-600">P1 다음: {p1Next}</div>
                            <div className="grid grid-cols-5 gap-2 w-full">
                                {p1Nums.map(n => <button key={n} onClick={() => handleClick(1, n)} className="aspect-square bg-white border-2 rounded-xl font-black text-xl shadow-sm">{n}</button>)}
                            </div>
                        </div>
                        <div className="flex-1 p-6 flex flex-col items-center">
                            <div className="mb-4 text-xl font-bold text-red-600">P2 다음: {p2Next}</div>
                            <div className="grid grid-cols-5 gap-2 w-full">
                                {p2Nums.map(n => <button key={n} onClick={() => handleClick(2, n)} className="aspect-square bg-white border-2 rounded-xl font-black text-xl shadow-sm">{n}</button>)}
                            </div>
                        </div>
                    </div>
                    {isFinished && <SuccessModal onRestart={initGame} onHome={onHome} winner={winner} />}
                </div>
            );
        };

        // --- Main App ---
        const App = () => {
            const [mode, setMode] = useState('MENU');
            if (mode === 'GAME1') return React.createElement(Game1, { onHome: () => setMode('MENU') });
            if (mode === 'GAME2') return React.createElement(Game2, { onHome: () => setMode('MENU') });
            if (mode === 'GAME3') return React.createElement(Battle, { maxNum: 10, onHome: () => setMode('MENU') });
            if (mode === 'GAME4') return React.createElement(Battle, { maxNum: 20, onHome: () => setMode('MENU') });

            return (
                <div className="min-h-screen flex flex-col items-center justify-center p-6">
                    <div className="text-center mb-16">
                        <h1 className="text-5xl font-black text-gray-800 mb-4">🎮 재미있는 숫자 놀이</h1>
                        <p className="text-gray-500 text-xl">하고 싶은 게임을 골라보세요!</p>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 w-full max-w-4xl">
                        <button onClick={() => setMode('GAME1')} className="bg-rose-50 border-4 border-rose-100 p-8 rounded-[2.5rem] text-left hover:shadow-xl transition-all">
                            <h3 className="text-2xl font-bold mb-2">1부터 10까지 순서대로!</h3>
                            <p className="text-gray-500">수 막대를 순서대로 놓아요</p>
                        </button>
                        <button onClick={() => setMode('GAME2')} className="bg-indigo-50 border-4 border-indigo-100 p-8 rounded-[2.5rem] text-left hover:shadow-xl transition-all">
                            <h3 className="text-2xl font-bold mb-2">10이 되는 짝꿍 찾기!</h3>
                            <p className="text-gray-500">드래그해서 10을 만들어요</p>
                        </button>
                        <button onClick={() => setMode('GAME3')} className="bg-amber-50 border-4 border-amber-100 p-8 rounded-[2.5rem] text-left hover:shadow-xl transition-all">
                            <h3 className="text-2xl font-bold mb-2">대결! 1부터 10</h3>
                            <p className="text-gray-500">누가 더 빠를까? (10까지)</p>
                        </button>
                        <button onClick={() => setMode('GAME4')} className="bg-emerald-50 border-4 border-emerald-100 p-8 rounded-[2.5rem] text-left hover:shadow-xl transition-all">
                            <h3 className="text-2xl font-bold mb-2">대결! 1부터 20</h3>
                            <p className="text-gray-500">누가 더 빠를까? (20까지)</p>
                        </button>
                    </div>
                </div>
            );
        };

        ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    </script>
</body>
</html>
